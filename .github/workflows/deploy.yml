name: Deploy

on:
  push:
    branches:
      - master

env:
  URL: 'https://pterodactyl-eggs.faithnode.com/'
  AUTHOR: 'admin@faithnode.com'
  COMMENT: 'GENERATED WITH FAITHNODE'

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Build
        working-directory: ./eggs
        run: |
          #!/bin/bash
          
          for i in $(find . -name egg.yml); do
            EGG_DIR=$(dirname "$i");
            OUT_DIR=$(dirname "../.dist/${EGG_DIR}")
            OUT_NAME=$(basename $EGG_DIR)
          
            mkdir -p "${OUT_DIR}"
          
            CONFIG=$(cat "${EGG_DIR}/egg.yml" | yq -o=json '(.. |
              with(select(tag == "!!var");
              . |= (. | to_string | split(".") | .[] as $item ireduce (load("../variables.yml"); .[$item]))
              ) |
              with(select(tag == "!!in");
              . |= (. | to_string | split(".") | .[] as $item ireduce (load("../translation.yml"); .[$item]))
              )) |= .');
          
            DATE="$(date '+%Y-%m-%dT%H:%M:%S%:z')";
          
            if [ -n "$COMMENT" ]; then COMMENT="\"$COMMENT\""; else COMMENT='null'; fi
            if [ -n "$URL" ]; then UPDATE_URL="\"$URL$(dirname $(echo $EGG_DIR | sed 's/^.\///'))/$OUT_NAME.json\""; else UPDATE_URL='null'; fi
            if [ -n "$AUTHOR" ]; then AUTHOR="\"$AUTHOR\""; else AUTHOR="\"admin@faithnode.com\""; fi
          
            NAME=$(echo $CONFIG | jq '.name')
            DESCRIPTION=$(echo $CONFIG | jq '.description');
          
            CMD=$(echo $CONFIG | jq '.config.cmd // "echo \"hello world\""');
          
            STARTUP=$(echo $CONFIG | jq '.config.startup // {"done":""}' | jq -sR .);
            FILES=$(echo $CONFIG | jq '.config.files // {}' | jq -sR .);
            LOGS=$(echo $CONFIG | jq '.config.logs // {}' | jq -sR .);
            STOP=$(echo $CONFIG | jq '.config.stop // "^C"');
          
            INSTALL_CONTAINER=$(echo $CONFIG | jq '.install.container // "debian:bookworm-slim"')
            INSTALL_ENTRYPOINT=$(echo $CONFIG | jq '.install.entrypoint // "/bin/bash"');
            INSTALL_SCRIPT=$(echo $CONFIG | jq '.install.script');
            if [ "$INSTALL_SCRIPT" == "null" ]; then INSTALL_SCRIPT="$(jq -sR '.' <<< $(cat "${EGG_DIR}/install.sh" || true))"; fi
            
            DOCKER_IMAGES=$(echo $CONFIG | jq -c '.images[] | 
              (.tags // [null])[] as $v | {
                name: (.name | sub("{tag}"; $v | tostring)), 
                image: (.image | sub("{tag}"; $v | tostring))
              } | reduce . as $i ({}; .[$i.name] = $i.image)' | jq -s 'add');
            VARIABLES=$(echo $CONFIG | jq -c '.variables // [] | map({
              name,
              description,
              env_variable: .env,
              default_value: .value,
              user_viewable: (.permissions.view // true),
              user_editable: (.permissions.edit // true),
              rules: (.rules // "string"),
              field_type: (.type // "text")
            })');
            FEATURES=$(echo $CONFIG | jq -c '.features // []');
            DENYLIST=$(echo $CONFIG | jq -c '.config.denylist // []');

            jq . > "${OUT_DIR}/${OUT_NAME}.json" << EOF
            {
              "_comment": ${COMMENT},
              "meta": {
                "version": "PTDL_v2",
                "update_url": ${UPDATE_URL}
              },
              "name": ${NAME},
              "author": ${AUTHOR},
              "description": ${DESCRIPTION},
              "features": ${FEATURES},
              "docker_images": ${DOCKER_IMAGES},
              "file_denylist": ${DENYLIST},
              "startup": ${CMD},
              "config": {
                  "files": ${FILES},
                  "startup": ${STARTUP},
                  "logs": ${LOGS},
                  "stop": ${STOP}
              },
              "scripts": {
                  "installation": {
                      "script": ${INSTALL_SCRIPT},
                      "container": ${INSTALL_CONTAINER},
                      "entrypoint": ${INSTALL_ENTRYPOINT}
                  }
              },
              "variables": ${VARIABLES}
            }
          EOF
          done

      - name: Upload Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './.dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4