name: Custom
images:
  - !!var images.java
  - !!var images.java-eclipse-temurin
  - !!var images.java-openj9
  - !!var images.javafx

install:
  container: debian:buster-slim
  entrypoint: /bin/bash
  script: !!file install.sh

config:
  cmd: '{{_STARTUP_COMMAND}}'

variables:
  - env: _STARTUP_COMMAND
    name: !!in variables.startupCommand.name
    description: !!in variables.startupCommand.description
    value: bash run.sh
    rules: required|string|max:1000
  - env: _INSTALL_MINECRAFT_VERSION
    name: !!in variables.minecraftVersion.name
    description: !!in variables.minecraftVersion.description
    value: latest
    rules: required|string|max:1000
