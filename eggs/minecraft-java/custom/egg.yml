name: Custom
images:
  - name: Java {tag}
    image: 'ghcr.io/faithnode/pterodactyl-images/java:{tag}'
    tags: [ 8,11,15,16,17,18,19,20,21,22,23 ]
  - name: Java Eclipse Temurin {tag}
    image: 'ghcr.io/faithnode/pterodactyl-images/java-eclipse-temurin:{tag}'
    tags: [ 8,11,16,17,18,19,20,21 ]
  - name: Java OpenJ9 {tag}
    image: 'ghcr.io/faithnode/pterodactyl-images/java-openj9:{tag}'
    tags: [ 8,11,16,17,18,19,20,21 ]
  - name: Java FX {tag}
    image: 'ghcr.io/faithnode/pterodactyl-images/javafx:{tag}'
    tags: [ 11,15,16,17,18,19,20,21 ]

install:
  container: debian:buster-slim
  entrypoint: /bin/bash

config:
  cmd: '{{_STARTUP_COMMAND}}'

variables:
  - env: _STARTUP_COMMAND
    name: Команда запуска
    description: Команда, которая выполняется при запуске сервера
    value: bash run.sh
    rules: required|string|max:1000
    type: text
    permissions:
      view: true
      edit: true
  - env: _INSTALL_MINECRAFT_VERSION
    name: Версия Minecraft
    description: Список доступных версий можно посмотреть <a href="https://files.minecraftforge.net/net/minecraftforge/forge/" target="_blank">здесь</a>
    value: 1.21.4
    rules: required|string|max:1000
